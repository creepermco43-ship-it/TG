<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>

    <title>Team TG | Professional Esports Organization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; overflow-x: hidden; }
        .text-glow { text-shadow: 0 0 20px rgba(249, 115, 22, 0.7); }
    </style>
</head>
<body class="font-sans antialiased">

    <nav class="fixed w-full z-50 bg-black/80 backdrop-blur-md border-b border-orange-500/30">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-3xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white to-orange-500">TG</h1>
            <div class="hidden md:flex gap-8 font-semibold text-gray-300">
                <a href="index.html" class="text-orange-500">Home</a>
                <a href="games.html" class="hover:text-orange-500 transition">Games</a>
                <a href="about.html" class="hover:text-orange-500 transition">About Us</a>
                <a href="contact.html" class="hover:text-orange-500 transition">Contact</a>
            </div>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col items-center justify-center relative px-4 text-center">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-orange-600 rounded-full blur-[150px] opacity-20"></div>
        
        <h1 data-aos="zoom-in" data-aos-duration="1000" class="text-6xl md:text-9xl font-black uppercase tracking-tighter z-10 text-glow">
            Team <span class="text-orange-500">TG</span>
        </h1>
        <p data-aos="fade-up" data-aos-delay="300" class="mt-6 text-xl md:text-2xl text-gray-400 max-w-2xl z-10 font-medium">
            India's Most Elite Esports Organization <br>
            <span class="text-white">Valorant | BGMI | Minecraft</span>
        </p>
        
        <a href="https://discord.gg/ZKr66hgzwY" target="_blank" data-aos="fade-up" data-aos-delay="600" 
           class="mt-10 px-10 py-4 bg-orange-600 hover:bg-orange-500 text-white font-bold rounded-full text-lg transition-all duration-300 hover:scale-110 shadow-[0_0_20px_rgba(249,115,22,0.5)] z-10">
            JOIN OUR DISCORD
        </a>

        <h2 data-aos="fade-right" class="text-4xl md:text-6xl font-bold mb-16 border-l-8 border-orange-500 pl-6 uppercase">Top Creators</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div data-aos="fade-up" data-aos-delay="100" class="bg-zinc-900 border border-zinc-800 hover:border-orange-500 p-8 rounded-2xl flex flex-col items-center transition-all duration-300 hover:-translate-y-2 group">
                <h3 class="text-2xl font-bold mb-6 text-white group-hover:text-orange-500 transition">Martian Is Live</h3>
                <a href="https://youtube.com/@martianislive0666?si=iusOzvKjz_FvTXrs" target="_blank" class="px-6 py-2 border border-orange-500 text-orange-500 rounded-full hover:bg-orange-600 hover:text-white transition">Watch on YouTube</a>
            </div>
            
            <div data-aos="fade-up" data-aos-delay="200" class="bg-zinc-900 border border-zinc-800 hover:border-orange-500 p-8 rounded-2xl flex flex-col items-center transition-all duration-300 hover:-translate-y-2 group">
                <h3 class="text-2xl font-bold mb-6 text-white group-hover:text-orange-500 transition">meui is live</h3>
                <a href="https://youtube.com/@meui_official?si=OSgPU9XXtGTljqCY" target="_blank" class="px-6 py-2 border border-orange-500 text-orange-500 rounded-full hover:bg-orange-600 hover:text-white transition">Watch on YouTube</a>
            </div>

            <div data-aos="fade-up" data-aos-delay="300" class="bg-zinc-900 border border-zinc-800 hover:border-orange-500 p-8 rounded-2xl flex flex-col items-center transition-all duration-300 hover:-translate-y-2 group">
                <h3 class="text-2xl font-bold mb-6 text-white group-hover:text-orange-500 transition">modak gaming</h3>
                <a href="https://youtube.com/@modakgaming6300?si=2WeYsbK24z2ZKgyX" target="_blank" class="px-6 py-2 border border-orange-500 text-orange-500 rounded-full hover:bg-orange-600 hover:text-white transition">Watch on YouTube</a>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ once: true });</script>

</html>
