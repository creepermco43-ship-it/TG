<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Team TG</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 1rem 3rem;
      background:
        radial-gradient(ellipse 60% 50% at 50% 50%, rgba(255,106,0,0.06), transparent),
        var(--black);
    }
    .auth-box {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2.5rem 2rem;
      position: relative;
      overflow: hidden;
    }
    .auth-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--orange);
    }
    .auth-logo {
      text-align: center;
      font-family: var(--font-head);
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 0.25rem;
    }
    .auth-logo span { color: var(--orange); }
    .auth-tagline {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 1.75rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      background: var(--dark);
      border: none;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .auth-tab:first-child { border-right: 1px solid var(--border); }
    .auth-tab.active { background: var(--orange); color: var(--black); font-weight: 700; }

    .auth-panel { display: none; }
    .auth-panel.active { display: block; }

    .auth-submit {
      width: 100%;
      background: var(--orange);
      color: var(--black);
      border: none;
      padding: 13px;
      font-family: var(--font-head);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }
    .auth-submit:hover { background: var(--orange-dim); }
    .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .forgot-link {
      text-align: right;
      margin-top: -0.75rem;
      margin-bottom: 1rem;
    }
    .forgot-link button {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 1px;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    }
    .forgot-link button:hover { color: var(--orange); }

    .auth-divider {
      text-align: center;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.68rem;
      margin: 1.25rem 0;
      position: relative;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      position: absolute;
      top: 50%; width: 35%;
      height: 1px;
      background: var(--border);
    }
    .auth-divider::before { left: 0; }
    .auth-divider::after { right: 0; }

    .dc-join-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: #5865F2;
      color: #fff;
      border: none;
      padding: 11px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 1px;
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .dc-join-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <script src="nav.js"></script>
  <main>
    <div class="auth-box">
      <div class="auth-logo">TEAM<span>TG</span></div>
      <div class="auth-tagline">Member Portal</div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN PANEL -->
      <div class="auth-panel active" id="panel-login">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="l-email" placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="l-pass" placeholder="••••••••" />
        </div>
        <div class="forgot-link">
          <button onclick="switchTab('forgot')">Forgot password?</button>
        </div>
        <button class="auth-submit" onclick="doLogin()">LOGIN</button>
        <div class="auth-divider">or</div>
        <a href="https://discord.gg/ZKr66hgzwY" target="_blank" class="dc-join-btn">Join Discord Community</a>
      </div>

      <!-- REGISTER PANEL -->
      <div class="auth-panel" id="panel-register">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="r-username" placeholder="YourGamerTag" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="r-email" placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="r-pass" placeholder="Min 6 characters" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="r-pass2" placeholder="Repeat password" />
        </div>
        <button class="auth-submit" onclick="doRegister()">CREATE ACCOUNT</button>
        <div class="auth-divider">or</div>
        <a href="https://discord.gg/ZKr66hgzwY" target="_blank" class="dc-join-btn">Join Discord Community</a>
      </div>

      <!-- FORGOT PASSWORD PANEL -->
      <div class="auth-panel" id="panel-forgot">
        <p style="color:var(--muted);font-size:0.85rem;margin-bottom:1.25rem;line-height:1.6;">
          Enter your registered email. A password reset request will be sent to the admin.
        </p>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="f-email" placeholder="your@email.com" />
        </div>
        <button class="auth-submit" onclick="doForgot()">SEND RESET REQUEST</button>
        <div style="text-align:center;margin-top:1rem;">
          <button onclick="switchTab('login')" style="background:none;border:none;color:var(--muted);font-family:var(--font-mono);font-size:0.68rem;cursor:pointer;text-decoration:underline;">Back to Login</button>
        </div>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
  <script>
    function switchTab(tab) {
      document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('panel-' + tab).classList.add('active');
      if (tab === 'login') document.querySelector('.auth-tab:first-child').classList.add('active');
      if (tab === 'register') document.querySelector('.auth-tab:last-child').classList.add('active');
    }

    // ── REGISTER ──────────────────────────────────────────────────
    async function doRegister() {
      const username = document.getElementById('r-username').value.trim();
      const email    = document.getElementById('r-email').value.trim();
      const pass     = document.getElementById('r-pass').value;
      const pass2    = document.getElementById('r-pass2').value;

      if (!username || !email || !pass) { showToast('Sab fields fill karo!', 'error'); return; }
      if (pass !== pass2) { showToast('Passwords match nahi kar rahe!', 'error'); return; }
      if (pass.length < 6) { showToast('Password 6+ characters ka hona chahiye!', 'error'); return; }

      const users = getUsers();
      if (users.find(u => u.email === email)) { showToast('Email already registered hai!', 'error'); return; }

      const newUser = { username, email, pass, role: 'member', joinedAt: new Date().toISOString() };
      users.push(newUser);
      saveUsers(users);
      setCurrentUser(newUser);

      // Notify Discord
      await sendWebhook(WEBHOOK_MAIN, {
        title: '🆕 New Registration — Team TG',
        color: 0xFF6A00,
        fields: [
          { name: 'Username', value: username, inline: true },
          { name: 'Email', value: email, inline: true },
          { name: 'Time', value: new Date().toLocaleString('en-IN'), inline: false }
        ],
        footer: { text: 'Team TG Member Portal' }
      });
      await sendWebhook(WEBHOOK_SEC, {
        title: '🆕 New Registration — Team TG',
        color: 0xFF6A00,
        fields: [
          { name: 'Username', value: username, inline: true },
          { name: 'Email', value: email, inline: true },
          { name: 'Time', value: new Date().toLocaleString('en-IN'), inline: false }
        ],
        footer: { text: 'Team TG Member Portal' }
      });

      showToast('Account created! Welcome to Team TG 🔥', 'success');
      setTimeout(() => location.href = 'home.html', 1500);
    }

    // ── LOGIN ─────────────────────────────────────────────────────
    function doLogin() {
      const email = document.getElementById('l-email').value.trim();
      const pass  = document.getElementById('l-pass').value;

      // Admin check
      if (email === 'teamtg0519@gmail.com' && pass === 'teamtg0519@') {
        setCurrentUser({ username: 'Admin', email, role: 'admin' });
        showToast('Welcome back, Admin!', 'success');
        setTimeout(() => location.href = 'admin.html', 1200);
        return;
      }

      const users = getUsers();
      const user = users.find(u => u.email === email && u.pass === pass);
      if (!user) { showToast('Email ya password galat hai!', 'error'); return; }

      setCurrentUser(user);
      showToast('Welcome back, ' + (user.username || 'Member') + '!', 'success');
      setTimeout(() => location.href = 'home.html', 1200);
    }

    // ── FORGOT PASSWORD ───────────────────────────────────────────
    async function doForgot() {
      const email = document.getElementById('f-email').value.trim();
      if (!email) { showToast('Email daalo pehle!', 'error'); return; }

      const users = getUsers();
      const user = users.find(u => u.email === email);

      await sendWebhook(WEBHOOK_MAIN, {
        title: '🔑 Password Reset Request — Team TG',
        color: 0xFFAA00,
        fields: [
          { name: 'Email', value: email, inline: true },
          { name: 'User Found', value: user ? 'Yes — ' + (user.username || 'N/A') : 'No account found', inline: true },
          { name: 'Time', value: new Date().toLocaleString('en-IN'), inline: false }
        ],
        footer: { text: 'Team TG Member Portal — Admin action needed' }
      });
      await sendWebhook(WEBHOOK_SEC, {
        title: '🔑 Password Reset Request — Team TG',
        color: 0xFFAA00,
        fields: [
          { name: 'Email', value: email, inline: true },
          { name: 'User Found', value: user ? 'Yes — ' + (user.username || 'N/A') : 'No account found', inline: true },
          { name: 'Time', value: new Date().toLocaleString('en-IN'), inline: false }
        ],
        footer: { text: 'Team TG Member Portal — Admin action needed' }
      });

      showToast('Reset request Discord pe bhej diya. Admin contact karega!', 'success');
      document.getElementById('f-email').value = '';
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const active = document.querySelector('.auth-panel.active').id;
      if (active === 'panel-login') doLogin();
      if (active === 'panel-register') doRegister();
      if (active === 'panel-forgot') doForgot();
    });
  </script>
</body>
</html>
