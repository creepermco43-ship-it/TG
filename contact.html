<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Team TG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>body { background-color: #000; color: #fff; }</style>
</head>
<body class="font-sans antialiased">

    <nav class="fixed w-full z-50 bg-black/80 backdrop-blur-md border-b border-orange-500/30">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-orange-500">TG</h1>
            <div class="hidden md:flex gap-8 font-semibold text-gray-300">
                <a href="index.html" class="hover:text-orange-500 transition">Home</a>
                <a href="games.html" class="hover:text-orange-500 transition">Games</a>
                <a href="about.html" class="hover:text-orange-500 transition">About Us</a>
                <a href="contact.html" class="text-orange-500">Contact</a>
            </div>
        </div>
    </nav>

    <section class="min-h-screen pt-32 px-6 max-w-3xl mx-auto flex flex-col items-center">
        <h2 data-aos="fade-down" class="text-5xl font-black mb-4 uppercase">Contact <span class="text-orange-500">Us</span></h2>
        <p data-aos="fade-up" class="text-gray-400 mb-10 text-center">Want to join the organization or have a business inquiry? Drop a message below.</p>

        <form id="contactForm" data-aos="zoom-in" class="w-full bg-zinc-900 p-8 rounded-2xl border border-zinc-800 shadow-2xl">
            <div class="mb-6">
                <label class="block text-orange-500 font-bold mb-2">Your Name</label>
                <input type="text" id="name" required class="w-full bg-black border border-zinc-700 rounded-lg p-3 text-white focus:border-orange-500 focus:outline-none">
            </div>
            <div class="mb-6">
                <label class="block text-orange-500 font-bold mb-2">Email or Discord ID</label>
                <input type="text" id="email" required class="w-full bg-black border border-zinc-700 rounded-lg p-3 text-white focus:border-orange-500 focus:outline-none">
            </div>
            <div class="mb-6">
                <label class="block text-orange-500 font-bold mb-2">Message</label>
                <textarea id="message" rows="5" required class="w-full bg-black border border-zinc-700 rounded-lg p-3 text-white focus:border-orange-500 focus:outline-none"></textarea>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-4 rounded-lg transition-colors text-lg">
                SEND MESSAGE TO ADMIN
            </button>
            <p id="statusMsg" class="text-center mt-4 font-bold hidden"></p>
        </form>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('statusMsg');
            
            btn.innerText = "SENDING...";
            btn.disabled = true;

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;

            // Discord Webhook Data Formatting
            const payload = {
                content: null,
                embeds: [{
                    title: "🔔 New Website Contact!",
                    color: 16740352, // Orange color
                    fields: [
                        { name: "👤 Name", value: name, inline: true },
                        { name: "📧 Contact Info", value: email, inline: true },
                        { name: "💬 Message", value: message }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };

            const webhook1 = "https://discord.com/api/webhooks/1484918907486863563/ditR6C24MbwY3UIAMG9-SRp04mMxrGt3cYhN_lQjHx7iMYoBeFhHvwOwd1eZS0azhL8T";
            const webhook2 = "https://discord.com/api/webhooks/1484919096503046185/PQH08_DlvCZd3i1tRBASsvQtEq3Xnao4_FlQVBaOEFABSD_GwAcp-tMn74C9QWdBgP6S";

            try {
                // Sending to both webhooks simultaneously
                await Promise.all([
                    fetch(webhook1, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }),
                    fetch(webhook2, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
                ]);

                status.innerText = "✅ Message sent successfully!";
                status.className = "text-center mt-4 font-bold text-green-500 block";
                document.getElementById('contactForm').reset();
            } catch (error) {
                status.innerText = "❌ Failed to send message.";
                status.className = "text-center mt-4 font-bold text-red-500 block";
            } finally {
                btn.innerText = "SEND MESSAGE TO ADMIN";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
